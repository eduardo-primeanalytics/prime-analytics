<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Prime Analytics</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#F5F7FA;--ink:#16283C;--cobalt:#2456C7;--amber:#E8A13C;--muted:#5B6B7D;--line:#D7DEE7}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'IBM Plex Sans',sans-serif;background:var(--paper);color:var(--ink);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.wrap{max-width:480px;margin:0 auto;padding:24px;text-align:center}
.logo{font-family:'Bitter',serif;font-weight:800;font-size:1.1rem;text-decoration:none;color:var(--ink);display:inline-block;margin-bottom:40px}
.logo span{color:var(--cobalt)}
.code{font-family:'IBM Plex Mono',monospace;color:var(--amber);font-size:.85rem;letter-spacing:.1em;margin-bottom:12px}
h1{font-family:'Bitter',serif;font-weight:800;font-size:1.7rem;margin-bottom:12px;letter-spacing:-.01em}
p{color:var(--muted);font-size:.96rem;margin-bottom:28px}
.btn{
  display:inline-block;background:var(--cobalt);color:#fff;padding:11px 22px;
  border-radius:8px;text-decoration:none;font-weight:600;font-size:.95rem;
}
</style>
</head>
<body>
<div class="wrap">
  <a class="logo" href="/">Prime<span>&nbsp;Analytics</span></a>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist, or moved.</p>
  <a class="btn" href="/">Back to primeanalytics.ai</a>
</div>
</body>
</html>
